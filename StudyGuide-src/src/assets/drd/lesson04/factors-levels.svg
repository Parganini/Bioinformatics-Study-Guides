  <text x="90" y="110" font-size="24" font-weight="900" fill="#0f766e" letter-spacing="6">DRD · MODULE 2</text>
  <text x="90" y="170" font-size="54" font-weight="950" fill="#0c0a09">Factors and levels</text>
  <text x="90" y="222" font-size="30" font-weight="700" fill="#57534e">Categorical variables used for models and plots</text>
  <circle cx="90" cy="165" r="10" fill="#0f766e" opacity="0.9"/><text x="120" y="176" font-size="34" font-weight="700" fill="#292524">Factors store categories as integer levels</text><circle cx="90" cy="227" r="10" fill="#0f766e" opacity="0.9"/><text x="120" y="238" font-size="34" font-weight="700" fill="#292524">Level order controls model contrasts and plot order</text><circle cx="90" cy="289" r="10" fill="#0f766e" opacity="0.9"/><text x="120" y="300" font-size="34" font-weight="700" fill="#292524">Changing levels does not change the original labels</text>
  <rect x="60" y="550" width="1080" height="170" rx="28" fill="#1c1917"/><text x="90" y="578" font-size="20" font-weight="900" fill="#fecaca" letter-spacing="4">R CONSOLE</text><text x="90" y="594" font-size="27" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f8fafc">treat &lt;- factor(c(&quot;B&quot;,&quot;A&quot;,&quot;C&quot;))</text><text x="90" y="632" font-size="27" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f8fafc">levels(treat)</text><text x="90" y="670" font-size="27" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f8fafc">as.numeric(treat)</text>
