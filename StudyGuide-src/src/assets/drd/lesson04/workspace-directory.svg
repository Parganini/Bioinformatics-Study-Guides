<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffaf0"/><stop offset="1" stop-color="#ecfdf5"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1200" height="760" rx="54" fill="url(#bg)"/>
  <circle cx="1050" cy="80" r="170" fill="#d97706" opacity="0.13"/>
  <rect x="50" y="50" width="1100" height="660" rx="48" fill="#ffffff" opacity="0.92" filter="url(#shadow)"/>
  <text x="90" y="110" font-size="24" font-weight="900" fill="#d97706" letter-spacing="6">DRD · MODULE 2</text>
  <text x="90" y="170" font-size="54" font-weight="950" fill="#0c0a09">Workspace and directory</text>
  <text x="90" y="222" font-size="30" font-weight="700" fill="#57534e">Know where objects live and where files are read from</text>
  <circle cx="90" cy="165" r="10" fill="#d97706" opacity="0.9"/><text x="120" y="176" font-size="34" font-weight="700" fill="#292524">ls(): list objects in the current workspace</text><circle cx="90" cy="227" r="10" fill="#d97706" opacity="0.9"/><text x="120" y="238" font-size="34" font-weight="700" fill="#292524">rm(list = ls()): clean objects from memory</text><circle cx="90" cy="289" r="10" fill="#d97706" opacity="0.9"/><text x="120" y="300" font-size="34" font-weight="700" fill="#292524">getwd()/setwd(): inspect or change the working directory</text>
  <rect x="60" y="550" width="1080" height="170" rx="28" fill="#1c1917"/><text x="90" y="578" font-size="20" font-weight="900" fill="#fecaca" letter-spacing="4">R CONSOLE</text><text x="90" y="594" font-size="27" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f8fafc">rm(list = ls())</text><text x="90" y="632" font-size="27" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f8fafc">getwd()</text><text x="90" y="670" font-size="27" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#f8fafc">setwd(&quot;~/DRD/Lesson1&quot;)</text>
</svg>